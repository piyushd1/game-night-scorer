name: Deploy to Firebase Hosting on PR
on: pull_request
permissions:
  checks: write
  contents: read
  pull-requests: write
jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Stamp service worker version with short SHA
        # Same treatment as the merge workflow so PR previews get a unique
        # cache version per push — otherwise every preview would share the
        # literal '__VERSION__' cache key.
        run: |
          SHORT_SHA="${{ github.event.pull_request.head.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"
          sed -i "s/__VERSION__/${SHORT_SHA}/" public/sw.js
          echo "Stamped sw.js with VERSION=${SHORT_SHA}"
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_GAME_NIGHT_SCORER }}
          projectId: game-night-scorer
