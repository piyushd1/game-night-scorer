<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Modern Minimalist Scorer - Winner Reveal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#ec4141",
            "background-light": "#f8f6f6",
            "background-dark": "#211111",
            "accent-blue": "#0047FF",
            "accent-red": "#FF2E2E",
            "accent-yellow": "#FFB800",
            "accent-green": "#00B85C",
          },
          fontFamily: {
            "display": ["Space Grotesk", "sans-serif"]
          },
          borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
        },
      },
    }
  </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display bg-primary text-white h-screen w-screen overflow-hidden flex flex-col justify-between selection:bg-white selection:text-primary">
<!-- Confetti Canvas Placeholder -->
<div aria-hidden="true" class="absolute inset-0 pointer-events-none overflow-hidden">
<!-- Static representation of confetti using CSS shapes for pure HTML output -->
<div class="absolute top-10 left-10 w-3 h-3 bg-accent-blue rounded-full opacity-80 transform rotate-45"></div>
<div class="absolute top-20 right-20 w-4 h-2 bg-accent-yellow opacity-90 transform -rotate-12"></div>
<div class="absolute top-1/4 left-1/3 w-2 h-4 bg-accent-green opacity-70 transform rotate-12"></div>
<div class="absolute top-1/3 right-1/4 w-3 h-3 bg-white rounded-full opacity-60"></div>
<div class="absolute bottom-1/3 left-1/4 w-4 h-2 bg-accent-blue opacity-80 transform -rotate-45"></div>
<div class="absolute top-1/2 right-10 w-2 h-4 bg-accent-yellow opacity-90 transform rotate-45"></div>
</div>
<!-- Main Winner Content -->
<main class="flex-grow flex flex-col items-center justify-center px-6 pt-12 pb-8 z-10 relative">
<!-- Hero Group -->
<div class="text-center w-full max-w-md mx-auto mb-12">
<h3 class="text-white/80 uppercase tracking-widest text-lg font-bold mb-2 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-2xl" style="font-variation-settings: 'FILL' 1;">emoji_events</span>
        Winner
      </h3>
<h1 class="text-white text-[48px] font-bold leading-none mb-4 uppercase tracking-tight truncate">
        Player 1
      </h1>
<div class="text-white text-[72px] font-bold leading-none tracking-tighter">
        124 <span class="text-3xl text-white/80 align-baseline">PTS</span>
</div>
</div>
<!-- Leaderboard -->
<div class="w-full max-w-sm mx-auto space-y-4">
<!-- 2nd Place -->
<div class="flex justify-between items-center py-3 border-b border-white/20 text-white/90">
<div class="flex items-center gap-4">
<span class="text-white/50 font-bold w-6 text-center">2</span>
<span class="font-medium text-lg">Player 3</span>
</div>
<span class="font-bold text-xl">118</span>
</div>
<!-- 3rd Place -->
<div class="flex justify-between items-center py-3 border-b border-white/20 text-white/80">
<div class="flex items-center gap-4">
<span class="text-white/50 font-bold w-6 text-center">3</span>
<span class="font-medium text-lg">Player 2</span>
</div>
<span class="font-bold text-xl">96</span>
</div>
<!-- 4th Place -->
<div class="flex justify-between items-center py-3 border-b border-white/20 text-white/70">
<div class="flex items-center gap-4">
<span class="text-white/50 font-bold w-6 text-center">4</span>
<span class="font-medium text-lg">Player 4</span>
</div>
<span class="font-bold text-xl">82</span>
</div>
</div>
</main>
<!-- Fixed Bottom Action -->
<footer class="w-full p-6 z-10 relative bg-primary">
<button class="w-full bg-[#1A1A1A] hover:bg-black text-white text-lg font-bold h-14 rounded-DEFAULT flex items-center justify-center transition-colors focus:outline-none focus:ring-4 focus:ring-white/30">
      New Game
    </button>
</footer>
</body></html>
