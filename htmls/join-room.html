<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Scorer - Home</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
        .animate-shake {
            animation: shake 0.3s ease-in-out;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ec4141",
                        "background-light": "#F4F4F2",
                        "background-dark": "#211111",
                        "text-main": "#1A1A1A",
                        "muted": "#8C8C85"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "mono": ["Space Mono", "monospace"]
                    },
                    borderRadius: { "DEFAULT": "0.125rem", "sm": "0.25rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem" },
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light font-display text-text-main h-screen flex flex-col items-center justify-center overflow-hidden">
<!-- Header Component (From Shared Assets) -->
<div class="relative flex w-full flex-col bg-background-light group/design-root overflow-x-hidden absolute top-0">
<h1 class="text-text-main tracking-tight text-[32px] font-bold leading-tight px-4 text-center pb-3 pt-12">SCORER</h1>
</div>
<main class="w-full max-w-md px-6 flex flex-col gap-12 mt-16">
<!-- Host Section -->
<div class="flex flex-col gap-4">
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-sm h-14 bg-text-main text-white text-lg font-bold leading-normal tracking-wide transition-colors hover:bg-black active:scale-[0.98]">
<span class="truncate">Create Session</span>
</button>
</div>
<!-- Divider -->
<div class="relative flex py-2 items-center">
<div class="flex-grow border-t border-muted/30"></div>
<span class="flex-shrink-0 mx-4 text-muted text-sm font-medium">OR OBSERVE</span>
<div class="flex-grow border-t border-muted/30"></div>
</div>
<!-- Join Section -->
<div class="flex flex-col gap-4">
<div class="relative">
<input aria-label="Observer PIN" class="w-full h-14 bg-transparent border border-text-main rounded-sm text-center text-2xl font-mono font-bold tracking-[0.5em] placeholder:text-muted placeholder:tracking-normal placeholder:font-display placeholder:text-base focus:outline-none focus:ring-2 focus:ring-text-main focus:border-transparent uppercase transition-all" maxlength="4" placeholder="ENTER PIN" type="text"/>
<!-- Example Error State: Add 'border-primary text-primary animate-shake' to input above to see it -->
</div>
<button class="flex w-full cursor-pointer items-center justify-center overflow-hidden rounded-sm h-14 border border-text-main bg-transparent text-text-main text-lg font-bold leading-normal tracking-wide transition-colors hover:bg-text-main hover:text-white active:scale-[0.98] disabled:opacity-50 disabled:cursor-not-allowed">
<span class="truncate">Join Room</span>
</button>
</div>
</main>
</body></html>
