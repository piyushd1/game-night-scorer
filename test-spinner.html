<!DOCTYPE html>
<html>
<head>
<style>
.btn-primary {
  background: #000000;
  color: #ffffff;
  padding: 14px 24px;
}
.spinner {
  width: 24px;
  height: 24px;
  border: 2px solid #c6c6c6;
  border-top-color: #000000;
  border-radius: 50%;
  animation: spin 0.6s linear infinite;
}
</style>
</head>
<body style="background: white;">
  <button class="btn-primary">
    <div class="spinner"></div>
  </button>
</body>
</html>
